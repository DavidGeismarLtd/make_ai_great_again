# Exported from Render on 2026-03-09T09:44:28Z
version: "1"
projects:
- name: My project
  environments:
  - name: Production
    services:
    - type: worker
      name: agents_on_rails_sidekiq_worker
      runtime: ruby
      repo: https://github.com/DavidGeismarLtd/agents_on_rails
      plan: starter
      envVars:
      - key: REDIS_URL
        fromService:
          name: agents-on-rails-redis
          type: keyvalue
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: agents-on-rails-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: WEB_CONCURRENCY
        sync: false
      region: frankfurt
      buildCommand: bundle install
      startCommand: bundle exec sidekiq
      autoDeployTrigger: commit
    - type: web
      name: agents_on_rails_web_service
      runtime: ruby
      repo: https://github.com/DavidGeismarLtd/agents_on_rails
      plan: starter
      envVars:
      - key: REDIS_URL
        fromService:
          name: agents-on-rails-redis
          type: keyvalue
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: agents-on-rails-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: WEB_CONCURRENCY
        sync: false
      region: frankfurt
      buildCommand: bundle install; bundle exec rake assets:precompile; bundle exec
        rake assets:clean;
      startCommand: bundle exec puma -t 5:5 -p ${PORT:-3000} -e ${RACK_ENV:-development}
      autoDeployTrigger: commit
    - type: keyvalue
      name: agents-on-rails-redis
      plan: free
      region: frankfurt
      maxmemoryPolicy: allkeys-lru
      ipAllowList: []
    databases:
    - name: agents-on-rails-db
      databaseName: agents_on_rails_db
      user: agents_on_rails_db_user
      plan: basic-256mb
      region: frankfurt
      ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere
      postgresMajorVersion: "18"
      diskSizeGB: 1

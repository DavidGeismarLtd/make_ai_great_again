# Sidekiq configuration
# See https://github.com/sidekiq/sidekiq/wiki/Advanced-Options for more options

# Production configuration
:concurrency: 5

# Queues to process (in order of priority)
:queues:
  - critical
  - prompt_tracker_tests
  - prompt_tracker_test_generation
  - prompt_tracker_dataset_generation
  - default
  - mailers
  - low

# Maximum number of retries for failed jobs
:max_retries: 5

# How long to wait before retrying a failed job (in seconds)
:retry_delay: 60

# Production-specific settings
production:
  :concurrency: 10
  :queues:
    - [critical, 3]
    - [prompt_tracker_tests, 2]
    - [prompt_tracker_test_generation, 2]
    - [prompt_tracker_dataset_generation, 2]
    - [default, 2]
    - [mailers, 1]
    - [low, 1]

# Development settings
development:
  :concurrency: 3
  :queues:
    - prompt_tracker_tests
    - prompt_tracker_test_generation
    - prompt_tracker_dataset_generation
    - default
    - mailers
    - low

# Test settings
test:
  :concurrency: 1
  :queues:
    - default

# Redis adapter allows communication between different processes (Rails server and Sidekiq)
# This is required for Turbo Streams to work from background jobs
development:
  adapter: redis
  url: <%= ENV.fetch("REDIS_URL", "redis://localhost:6379/0") %>
  channel_prefix: make_ai_great_again_development

test:
  adapter: test

production:
  adapter: redis
  url: <%= ENV.fetch("REDIS_URL") %>
  channel_prefix: make_ai_great_again_production
